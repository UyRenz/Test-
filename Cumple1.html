<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🎉 Mensajes de Cumpleaños 🎂</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #fceabb, #f8b500);
            color: #333;
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            padding: 20px;
            color: #d83c3c;
            text-shadow: 2px 2px #fff;
        }
        #chat {
            border: 2px dashed #fff;
            border-radius: 10px;
            padding: 15px;
            height: 400px;
            overflow-y: scroll;
            margin: 20px auto;
            width: 90%;
            background-color: rgba(255,255,255,0.6);
        }
        .mensaje {
            padding: 8px 12px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: inline-block;
            max-width: 70%;
            word-wrap: break-word;
        }
        .mine { background-color: #ffeb3b; text-align: right; margin-left: auto; }
        .other { background-color: #ff9800; text-align: left; margin-right: auto; }
        #form {
            display: flex;
            justify-content: center;
            margin: 20px;
        }
        #name, #message {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-right: 5px;
        }
        button {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            background-color: #d83c3c;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #ff5c5c; }
    </style>
</head>
<body>
    <h1>🎉 Deja tus buenos deseos 🎂</h1>

    <div id="chat"></div>

    <div id="form">
        <input type="text" id="name" placeholder="Tu nombre">
        <input type="text" id="message" placeholder="Escribe tu mensaje">
        <button onclick="sendMessage()">Enviar 🎈</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfcAF7rUbf651MW579u92rYVmvdLt--Ow",
            authDomain: "cumple1-5eeeb.firebaseapp.com",
            projectId: "cumple1-5eeeb",
            storageBucket: "cumple1-5eeeb.firebasestorage.app",
            messagingSenderId: "722404129554",
            appId: "1:722404129554:web:7b741400b2637c177651cb",
            databaseURL: "https://cumple1-5eeeb-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const chatDiv = document.getElementById("chat");
        const mensajesRef = ref(db, "cumpleanos_mensajes");

        // Escuchar mensajes en tiempo real
        onChildAdded(mensajesRef, (snapshot) => {
            const msg = snapshot.val();
            const div = document.createElement("div");
            div.classList.add("mensaje");
            // Colorear según si es tuyo o de otro
            div.classList.add(msg.name === localStorage.getItem('chatName') ? "mine" : "other");
            div.innerHTML = `<strong>${msg.name}</strong>: ${msg.text} 🎉`;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });

        // Enviar mensaje
        window.sendMessage = function() {
            const nameInput = document.getElementById("name");
            const messageInput = document.getElementById("message");
            const name = nameInput.value.trim();
            const text = messageInput.value.trim();
            if (!name || !text) return alert("Escribe tu nombre y mensaje");

            localStorage.setItem('chatName', name); // recordar quién eres
            push(mensajesRef, { name, text });
            messageInput.value = "";
        }
    </script>
</body>
</html>
