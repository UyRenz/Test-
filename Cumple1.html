<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mensajes Bonitos</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

  <style>
    body {
      background-image: url('https://images.pexels.com/photos/1793037/pexels-photo-1793037.jpeg');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: #333;
      min-height: 100vh;
      padding-top: 70px;
    }

    .site-header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
      backdrop-filter: saturate(140%) blur(8px);
      background: rgba(255, 255, 255, 0.85);
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
      text-align: center;
      font-weight: 700;
      font-size: 20px;
    }

    .card {
      backdrop-filter: blur(4px);
      background-color: rgba(255, 255, 255, 0.85);
      animation: fadeIn 0.5s ease-in-out;
      transition: transform 0.2s;
    }

    .card:hover { transform: translateY(-4px); }

    .titulo-brillante {
      padding: 10px 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
      display: inline-block;
      margin-bottom: 20px;
    }

    .subtitulo-brillante {
      padding: 6px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      display: inline-block;
      margin-top: 30px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Flecha roja para borrar mensajes */
    #tab-borrar {
      position: fixed;
      top: 80px;
      right: 15px;
      background: rgba(255,0,0,0.7);
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 9999;
      font-weight: bold;
      font-size: 18px;
      transition: all 0.3s ease;
    }

    #tab-borrar:hover {
      width: auto;
      padding: 0 12px;
      border-radius: 20px;
      font-size: 16px;
    }

    #tab-borrar span { display: none; margin-left: 6px; }
    #tab-borrar:hover span { display: inline; }

    /* NUEVO: Ocultar botón de borrar en impresión */
    @media print {
      #tab-borrar {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="site-header">🎉 Mensajes Especiales 🎂</div>

<div class="container py-4">

  <div class="text-center">
    <h2 class="titulo-brillante">🎂 Un Espacio para Compartir 🎉</h2>
  </div>

  <div class="alert alert-danger p-4 shadow-sm" style="border-left: 6px solid #d9534f;">
    <h4 class="mb-2">📌 Mensaje Especial para Bryan Sanchez</h4>
    <p>Comparte un mensaje que inspire, motive o saque una sonrisa en este día especial. ¡Celebremos juntos! 🎂🎈🎉</p>
  </div>

  <!-- Formulario -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body">
      <h5 class="card-title">Escribe tu mensaje ✍️</h5>
      <form id="formMensaje" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Tu nombre</label>
          <input id="nombre" type="text" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Tu mensaje</label>
          <textarea id="mensaje" class="form-control" rows="4" required maxlength="300"></textarea>
        </div>
        <button id="btnGuardar" class="btn btn-success" type="submit">
          <span class="spinner-border spinner-border-sm me-2 d-none" id="spinnerGuardar"></span>
          Guardar mensaje
        </button>
      </form>
    </div>
  </div>

  <h4 class="subtitulo-brillante text-center">📬 Mensajes enviados</h4>
  <div id="listaMensajes" class="row g-3 mt-3"></div>

</div>

<!-- Botón flotante para borrar -->
<div id="tab-borrar" title="Borrar todos los mensajes">➤ <span>Borrar mensajes</span></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ===== Firebase =====
  const firebaseConfig = {
    apiKey: "AIzaSyDfcAF7rUbf651MW579u92rYVmvdLt--Ow",
    authDomain: "cumple1-5eeeb.firebaseapp.com",
    projectId: "cumple1-5eeeb",
    storageBucket: "cumple1-5eeeb.appspot.com",
    messagingSenderId: "722404129554",
    appId: "1:722404129554:web:7b741400b2637c177651cb"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const emojis = ["🎉","🎂","🎈","🥳","🎁","🎊","🍰","🧁","🍾","🥂","🎶","🎵","🎤","🎀","🎇","🎆","✨","🌟","⭐","💐","🌸","🎯","🎨"];

  function cargarMensajes() {
    const lista = document.getElementById("listaMensajes");
    db.collection("mensajes").orderBy("fecha","desc").onSnapshot(snapshot => {
      lista.innerHTML = "";
      snapshot.forEach(doc => {
        const m = doc.data();
        const emoji = emojis[Math.floor(Math.random()*emojis.length)];

        const col = document.createElement("div");
        col.className = "col-md-4";

        const card = document.createElement("div");
        card.className = "card shadow-sm";

        const body = document.createElement("div");
        body.className = "card-body";

        const h5 = document.createElement("h5");
        h5.className = "card-title";
        h5.textContent = `${emoji} ${m.nombre || ""}`;

        const p = document.createElement("p");
        p.className = "card-text";
        p.textContent = m.mensaje || "";

        body.appendChild(h5);
        body.appendChild(p);
        card.appendChild(body);
        col.appendChild(card);
        lista.appendChild(col);
      });
    }, err => {
      console.error(err);
      alert("Error al cargar mensajes en tiempo real.");
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("formMensaje");
    const nombre = document.getElementById("nombre");
    const mensaje = document.getElementById("mensaje");
    const btn = document.getElementById("btnGuardar");
    const spinner = document.getElementById("spinnerGuardar");

    form.addEventListener("submit", async e => {
      e.preventDefault();
      if (!nombre.value.trim() || !mensaje.value.trim()) return;

      btn.disabled = true;
      spinner.classList.remove("d-none");

      try {
        await db.collection("mensajes").add({
          nombre: nombre.value.trim(),
          mensaje: mensaje.value.trim(),
          fecha: firebase.firestore.FieldValue.serverTimestamp()
        });
        form.reset();
      } catch (err) {
        console.error(err);
        alert("Error guardando mensaje.");
      } finally {
        btn.disabled = false;
        spinner.classList.add("d-none");
      }
    });

    cargarMensajes();
  });

  // ===== Borrar todos los mensajes con contraseña =====
  const PASSWORD_BORRADO = "997R";

  document.getElementById('tab-borrar').addEventListener('click', async () => {
    const pass = prompt("Ingresa la contraseña para borrar todos los mensajes:");
    if (!pass) return alert("No ingresaste ninguna contraseña.");
    if (pass !== PASSWORD_BORRADO) return alert("Contraseña incorrecta.");

    const confirmado = confirm("¿Seguro que deseas borrar todos los mensajes? Esta acción no se puede deshacer.");
    if (!confirmado) return;

    try {
      const snapshot = await db.collection('mensajes').get();
      if (snapshot.empty) return alert("No hay mensajes para borrar.");

      const batchSize = 450;
      const docs = snapshot.docs;
      for (let i = 0; i < docs.length; i += batchSize) {
        const batch = db.batch();
        docs.slice(i, i + batchSize).forEach(doc => batch.delete(doc.ref));
        await batch.commit();
      }
      alert(`Se borraron ${docs.length} mensajes.`);
    } catch (err) {
      console.error(err);
      alert("Ocurrió un error borrando los mensajes.");
    }
  });
</script>
</body>
</html>
